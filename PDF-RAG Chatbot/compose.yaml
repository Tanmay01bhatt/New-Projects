services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACEHUB_API_TOKEN}
      - HF_HOME=/home/appuser/.cache/huggingface
    volumes:
      - hf_cache:/home/appuser/.cache/huggingface


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
  
volumes:
  hf_cache: